spring.application.name=user-api

# --- Serveur ---
server.port=8088

# --- Base de données H2 (en mémoire) ---
spring.datasource.url=jdbc:h2:mem:tododb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
# update : évite de supprimer les utilisateurs à chaque redémarrage pendant tes tests
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# --- Console H2 ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Autorise l'affichage de la console H2 dans une frame (nécessaire avec Spring Security)
spring.h2.console.settings.web-allow-others=true

# =====================================================
# AJOUTS POUR LA SÉCURITÉ (JWT & AUTH)
# =====================================================

# --- Configuration JWT ---
# Clé secrète (32 caractères min) pour signer tes Tokens
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# Expiration du token : 86400000 ms = 24 heures
app.jwt.expiration=86400000

# --- Swagger / OpenAPI Security ---
# Ces lignes aident Swagger à gérer les headers d'autorisation (Bearer Token)
#springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# --- Logs de Sécurité ---
# Très utile pour voir pourquoi un accès est refusé (403) ou si le BCrypt échoue
logging.level.org.springframework.security=DEBUG
logging.level.com.kfokam=DEBUG
logging.level.org.springframework.web=INFO